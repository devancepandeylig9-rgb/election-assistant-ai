<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Assistant AI</title>
    <!-- Link to external CSS for styling -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Main Chat Container -->
    <main class="chat-container" role="main" aria-label="Election Assistant Chat Interface">
        <!-- Header -->
        <header class="chat-header">
            <h1 id="app-title">Election Assistant AI</h1>
            <p>Your guide to the Indian election process</p>
        </header>
        
        <!-- Chat Area where messages will appear -->
        <section class="chat-display" id="chat-display" role="log" aria-live="polite" aria-labelledby="app-title">
            <!-- Initial Bot Message -->
            <div class="message bot-message" tabindex="0">
                <p>Hello! I am the Election Assistant AI. How can I help you understand the election process today?</p>
            </div>
        </section>

        <!-- Loading Indicator (Hidden by default) -->
        <div id="loading-indicator" class="loading-indicator" aria-hidden="true">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <span class="sr-only">AI is typing...</span>
        </div>

        <!-- Quick Action Buttons -->
        <nav class="quick-actions" aria-label="Quick action questions">
            <button class="action-btn" onclick="sendQuickMessage('How Elections Work')" aria-label="Ask about how elections work">How Elections Work</button>
            <button class="action-btn" onclick="sendQuickMessage('Voting Process')" aria-label="Ask about the voting process">Voting Process</button>
            <button class="action-btn" onclick="sendQuickMessage('Eligibility')" aria-label="Ask about voter eligibility">Eligibility</button>
            <button class="action-btn" onclick="sendQuickMessage('Election Timeline')" aria-label="Ask about the election timeline">Election Timeline</button>
        </nav>

        <!-- User Input Area -->
        <form class="chat-input-area" onsubmit="handleFormSubmit(event)" aria-label="Message input form">
            <label for="user-input" class="sr-only">Type your question here</label>
            <input type="text" id="user-input" placeholder="Type your question here..." aria-required="true">
            <button type="submit" id="send-btn" aria-label="Send message">Send</button>
        </form>
    </main>

    <!-- Link to external JavaScript -->
    <script src="script.js"></script>
</body>
</html>
